# ==========================================================================
#  Configuración de SonarQube / SonarCloud para el análisis de seguridad.
#  Coloca este archivo en la RAÍZ del proyecto. El scanner lo lee automáticamente.
#
#  IMPORTANTE: reemplaza los valores <...> por los de TU cuenta de SonarCloud:
#   - sonar.projectKey  y  sonar.organization los obtienes al crear el proyecto
#     en https://sonarcloud.io (Analyze new project).
#   - El token de autenticación NO se pone aquí; se pasa al ejecutar:
#       sonar-scanner -Dsonar.token=TU_TOKEN
#     o mediante la variable de entorno SONAR_TOKEN.
# ==========================================================================

sonar.projectKey=EmmanuelArMe_task-generator_UTB
sonar.organization=emmanuelarme
sonar.host.url=https://sonarcloud.io

sonar.projectName=Gestor de Tareas UTB
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# Código fuente a analizar y pruebas.
sonar.sources=lib
sonar.tests=test

# Reporte de cobertura de pruebas (generado con: flutter test --coverage).
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Exclusiones de COBERTURA (no de análisis): la cobertura unitaria se mide sobre
# la lógica de negocio (validadores, modelo, tema). La UI y los servicios que
# integran SDKs externos (Firebase, Google Maps) se validan con pruebas
# manuales/de integración, por lo que se excluyen de la métrica de cobertura.
sonar.coverage.exclusions=lib/main.dart,lib/screens/**,lib/services/**,lib/widgets/**


# Excluir carpetas generadas / nativas para evitar ruido y falsos positivos.
sonar.exclusions=**/build/**,**/.dart_tool/**,**/*.g.dart,android/**,ios/**,linux/**,macos/**,windows/**,web/**
